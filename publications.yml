- abstract: Phages and prophages play an essential role in controlling
    their host populations either by modulating the host abundance or
    providing them with genes that benefit the host. The constant growth
    in next-generation sequencing technology has caused the development
    of powerful computational tools to identify phages and prophages
    with high precision. , ABSTRACT Phages and prophages are one of the
    principal modulators of microbial populations. However, much of
    their diversity is still poorly understood. Here, we extracted
    33,624 prophages from 13,713 complete prokaryotic genomes to explore
    the prophage diversity and their relationships with their host. Our
    results reveal that prophages were present in 75% of the genomes
    studied. In addition, Enterobacterales were significantly enriched
    in prophages. We also found that pathogens are a significant
    reservoir of prophages. Finally, we determined that the prophage
    relatedness and the range of genomic hosts were delimited by the
    evolutionary relationships of their hosts. On a broader level, we
    got insights into the prophage population, identified in thousands
    of publicly available prokaryotic genomes, by comparing the prophage
    distribution and relatedness between them and their hosts.
    IMPORTANCE Phages and prophages play an essential role in
    controlling their host populations either by modulating the host
    abundance or providing them with genes that benefit the host. The
    constant growth in next-generation sequencing technology has caused
    the development of powerful computational tools to identify phages
    and prophages with high precision. Making it possible to explore the
    prophage populations integrated into host genomes on a large scale.
    However, it is still a new and under-explored area, and efforts are
    still required to identify prophage populations to understand their
    dynamics with their hosts.
