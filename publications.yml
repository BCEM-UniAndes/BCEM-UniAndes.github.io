- abstract: The study of viral communities has revealed the enormous
    diversity and impact these biological entities have on a range of
    different ecosystems. These observations have sparked widespread
    interest in developing computational strategies that support the
    comprehensive characterization of viral communities based on
    sequencing data. Here we introduce VIRify, a new computational
    pipeline designed to provide a user-friendly and accurate functional
    and taxonomic characterization of viral communities. VIRify
    identifies viral contigs and prophages from metagenomic assemblies
    and annotates them using a collection of viral profile hidden Markov
    models (HMMs). These include our manually-curated profile HMMs,
    which serve as specific taxonomic markers for a wide range of
    prokaryotic and eukaryotic viral taxa and are thus used to reliably
    classify viral contigs. We tested VIRify on assemblies from two
    microbial mock communities and a large metagenomics study. The
    results showed that VIRify was able to identify sequences from both
    prokaryotic and eukaryotic viruses, and provided taxonomic
    classifications from the genus to the family rank with an accuracy
    of at least 95.5%. In addition, VIRify allowed the detection and
    taxonomic classification of a range of prokaryotic and eukaryotic
    viruses present in 243 marine metagenomic assemblies. Overall, we
    demonstrate that VIRify is a novel and powerful resource that offers
    an enhanced capability to detect a broad range of viral contigs and
    taxonomically classify them.
