- abstract: "Background: Fast and computationally efficient strategies
    are required to explore genomic relationships within an increasingly
    large and diverse phage sequence space. Here, we present
    PhageClouds, a novel approach using a graph database of phage
    genomic sequences and their intergenomic distances to explore the
    phage genomic sequence space. Methods: A total of 640,000 phage
    genomic sequences were retrieved from a variety of databases and
    public virome assemblies. Intergenomic distances were calculated
    with dashing, an alignment-free method suitable for handling massive
    data sets. These data were used to build a Neo4j® graph database.
    Results: PhageClouds supported the search of related phages among
    all complete phage genomes from GenBank for a single query phage in
    just 10 s. Moreover, PhageClouds expanded the number of closely
    related phage sequences detected for both finished and draft phage
    genomes, in comparison with searches exclusively targeting phage
    entries from GenBank. Conclusions: PhageClouds is a novel resource
    that will facilitate the analysis of phage genomic sequences and the
    characterization of assembled phage genomes."
